<!-- Floating Chat Button -->
<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
    <!-- Chat Window -->
    <div class="chat-window mb-4 bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-slate-100 flex flex-col overflow-hidden transition-all duration-300 origin-bottom-right"
         [class.open]="isOpen()">
        
        <!-- Header -->
        <div class="bg-linear-to-r from-[#001e40] to-[#003d75] text-white px-5 py-4 flex items-center justify-between border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="relative w-10 h-10">
                    <img src="/assets/bernardo.png" alt="Bernardo Avatar" class="w-10 h-10 rounded-full object-cover border-2 border-[#2dbcfe]" />
                    <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 border-2 border-[#001e40] rounded-full animate-pulse"></span>
                </div>
                <div class="flex flex-col text-left">
                    <span class="font-display text-sm font-bold tracking-wide leading-tight">Bernardo O'Higgins</span>
                    <span class="text-[0.65rem] text-[#2dbcfe] font-medium leading-none">Asistente Virtual · En línea</span>
                </div>
            </div>
            <button mat-icon-button (click)="toggleChat()" class="text-white/80! hover:text-white! hover:bg-white/10!">
                <mat-icon>close</mat-icon>
            </button>
        </div>

        <!-- Messages Area -->
        <div #chatScrollContainer class="flex-1 p-5 overflow-y-auto space-y-4 bg-slate-50 flex flex-col min-h-0">
            @for (msg of messages(); track msg.time) {
                <div class="max-w-[80%] flex flex-col" 
                     [class.self-end]="msg.isUser" 
                     [class.self-start]="!msg.isUser">
                    
                    <div class="px-4 py-3 rounded-2xl text-sm leading-relaxed shadow-xs"
                         [class.bg-gradient]="msg.isUser"
                         [class.bg-white]="!msg.isUser"
                         [class.text-white]="msg.isUser"
                         [class.text-[#1a1c1c]]="!msg.isUser"
                         [class.rounded-tr-none]="msg.isUser"
                         [class.rounded-tl-none]="!msg.isUser"
                         [class.border]="!msg.isUser"
                         [class.border-slate-100]="!msg.isUser">
                        {{ msg.text }}
                        @if (msg.paymentUrl) {
                            <div class="mt-3">
                                <a [href]="msg.paymentUrl" class="inline-block bg-[#00658d] text-white px-4 py-2 rounded-lg font-bold hover:bg-[#004a6b] transition-colors shadow-sm text-center w-full">IR A PAGAR</a>
                            </div>
                        }
                    </div>
                    <span class="text-[0.6rem] text-slate-400 mt-1 px-1" 
                          [class.text-right]="msg.isUser"
                          [class.text-left]="!msg.isUser">
                        {{ msg.time | date:'HH:mm' }}
                    </span>
                </div>
            }

            @if (isLoading()) {
                <div class="self-start max-w-[80%] flex flex-col">
                    <div class="px-4 py-3 rounded-2xl rounded-tl-none bg-white text-[#1a1c1c] border border-slate-100 shadow-xs flex items-center gap-1">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>
            }
        </div>

        <!-- Input Area -->
        <form (ngSubmit)="sendMessage()" class="p-3 bg-white border-t border-slate-100 flex items-center gap-2">
            <input type="text" 
                   [(ngModel)]="userInput" 
                   name="userInput"
                   placeholder="Escribe tu mensaje aquí..." 
                   autocomplete="off"
                   class="flex-1 border border-slate-200 rounded-full px-4 py-2.5 text-sm focus:outline-none focus:border-[#00658d] focus:ring-1 focus:ring-[#00658d] transition-all bg-slate-50 focus:bg-white text-slate-800" />
            
            <button type="submit" 
                    mat-icon-button 
                    [disabled]="isLoading() || !userInput().trim()"
                    class="bg-[#2dbcfe]! text-[#001e40]! disabled:bg-slate-100! disabled:text-slate-400! hover:bg-[#2dbcfe]/85! transition-all duration-300 w-10! h-10! rounded-full! flex items-center justify-center shrink-0 cursor-pointer">
                <mat-icon class="text-lg!">send</mat-icon>
            </button>
        </form>
    </div>

    <!-- Toggle Button -->
    <button (click)="toggleChat()" 
            class="flex items-center gap-4 bg-linear-to-r from-[#001e40] to-[#003d75] hover:from-[#002855] hover:to-[#004a8c] text-white px-7 py-4 rounded-full shadow-[0_10px_30px_rgba(0,30,64,0.3)] hover:shadow-[0_15px_40px_rgba(0,30,64,0.4)] transition-all duration-300 hover:scale-105 cursor-pointer border border-white/15 relative overflow-hidden group">
        <div class="relative w-11 h-11 rounded-full overflow-hidden border border-[#2dbcfe] shrink-0">
            <img src="/assets/bernardo.png" alt="Bernardo Face" class="w-full h-full object-cover" />
            <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 border border-[#001e40] rounded-full animate-pulse"></span>
        </div>
        <span class="text-sm font-display font-bold tracking-wide pr-1 select-none text-white/95 group-hover:text-white transition-colors">
            Hola Soy Bernardo
        </span>
        <div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
    </button>
</div>
