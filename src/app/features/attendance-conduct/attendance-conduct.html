<app-navbar/>

<div class="p-4 flex gap-3">
    <button mat-icon-button
          class="back-btn"
          matTooltip="Volver al inicio"
          (click)="volver()">
          <mat-icon>arrow_back</mat-icon>
        </button>
    <h2 class="text-4xl bold" >Asistencia y Conducta</h2>
</div>

<div class="asistencia-container">
    <!-- Filtros de curso y fecha -->
    <mat-card class="filtros-card" appearance="outlined">
        <mat-card-content class="filtros-content">
            <mat-form-field appearance="outline" class="filtro-field">
                <mat-label>Curso</mat-label>
                <mat-select [value]="cursoSeleccionado()" (valueChange)="cursoSeleccionado.set($event)">
                    <mat-option [value]="''">Seleccione un curso</mat-option>
                    @for (curso of cursosDisponibles(); track curso.curso_id) {
                    <mat-option [value]="curso.curso_id">{{ curso.nivel }} {{ curso.letra }} - {{ curso.asignatura_nombre }}</mat-option>
                    }
                </mat-select>
                <mat-icon matPrefix>class</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="filtro-field">
                <mat-label>Fecha</mat-label>
                <input matInput [matDatepicker]="picker" [value]="fechaSeleccionada()"
                    [matDatepickerFilter]="dateFilter"
                    (dateChange)="fechaSeleccionada.set($event.value!)">
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>
        </mat-card-content>
    </mat-card>

    <mat-tab-group animationDuration="300ms" class="tabs-group">
        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon class="tab-icon">how_to_reg</mat-icon>
                Asistencia
            </ng-template>
            <app-attendance [cursoId]="cursoSeleccionado()" [fecha]="fechaSeleccionada()"></app-attendance>
        </mat-tab>

        <mat-tab>
            <ng-template mat-tab-label>
                <mat-icon class="tab-icon">edit_note</mat-icon>
                Conducta
            </ng-template>
            <app-conduct [cursoId]="cursoSeleccionado()" [fecha]="fechaSeleccionada()"></app-conduct>
        </mat-tab>
    </mat-tab-group>

</div>
