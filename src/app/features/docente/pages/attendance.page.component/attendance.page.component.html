<app-navbar-docente>

    <section class="pt-30 px-[5%] gap-16 relative overflow-hidden">
        @if (cursosQuery.isPending()) {
        <app-loading-state message="Cargando cursos..." />
        } @else if (cursosQuery.isError()) {
        <app-error-state [error]="cursosQuery.error()" (retry)="cursosQuery.refetch()" />
        } @else {
            
        <!-- Filtros de curso y fecha -->
        <mat-card class="bg-white! mb-4" appearance="outlined">
            <mat-card-content class="flex! flex-col! sm:flex-row! items-stretch! sm:items-center! justify-center! gap-4!">

                <mat-form-field appearance="outline" class="filtro-field w-full sm:w-auto">
                    <mat-label>Curso</mat-label>
                    <mat-select [value]="cursoSeleccionado()" (selectionChange)="cursoSeleccionado.set($event.value)">
                        @for (curso of cursos(); track curso.curso_id) {
                        <mat-option [value]="curso">{{ curso.nivel }} {{ curso.letra }} — {{ curso.asignatura_nombre }}</mat-option>
                        }
                    </mat-select>
                    <mat-icon matPrefix>class</mat-icon>
                </mat-form-field>

            </mat-card-content>
        </mat-card>

        <!-- Tabs para alternar entre Asistencia y Conducta -->
        <mat-tab-group class="asistencia-tabs bg-white! p-4" animationDuration="500ms">
            <mat-tab>
                <ng-template mat-tab-label>
                    <mat-icon class="tab-icon">check_circle</mat-icon>
                    Asistencia
                </ng-template>
                <app-attendance-component [cursoId]="cursoIdSeleccionado()" [cadId]="cadIdSeleccionado()" [fecha]="fechaSeleccionada()" />
            </mat-tab>

            <mat-tab>
                <ng-template mat-tab-label>
                    <mat-icon class="tab-icon">edit_note</mat-icon>
                    Conducta
                </ng-template>
                <app-conduct-component [cursoId]="cursoIdSeleccionado()" [fecha]="fechaSeleccionada()" />

            </mat-tab>
        </mat-tab-group>
        }

    </section>

</app-navbar-docente>
