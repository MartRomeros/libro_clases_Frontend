<mat-toolbar
    class="fixed top-0 left-0 right-0 z-900 px-[5%]! h-20! bg-white/85! backdrop-blur-xl transition-all duration-300 border-b border-gray-200/15"
    [class.shadow-lg]="isScrolled()" id="navbar">
    <div class="flex items-center w-full max-w-[1200px] mx-auto">
        <a href="#inicio" class="flex items-center gap-2.5 shrink-0" id="logo-link">
            <div
                class="w-[42px] h-[42px] bg-linear-to-br from-[#001e40] to-[#003366] rounded-lg grid place-items-center shadow-md">
                <mat-icon class="text-white! w-6! h-6! text-[24px]">shield</mat-icon>
            </div>
            <div class="flex flex-col justify-center leading-[1.1]">
                <span class="font-display font-extrabold text-[1rem] text-[#001e40] tracking-tight">O'Higgins</span>
                <span class="text-[0.625rem] text-gray-500 font-medium tracking-widest uppercase">Colegio
                    Bernardo</span>
            </div>
        </a>

        <div class="hidden md:flex gap-2 ml-auto">
            <a mat-button href="#inicio" class="nav-link text-gray-600! hover:text-[#001e40]! px-4!">Inicio</a>
            <a mat-button href="#nosotros" class="nav-link text-gray-600! hover:text-[#001e40]! px-4!">Nuestro
                Colegio</a>
            <a mat-button href="#departamentos"
                class="nav-link text-gray-600! hover:text-[#001e40]! px-4!">Departamentos</a>
            <a mat-button href="#utiles" class="nav-link text-gray-600! hover:text-[#001e40]! px-4!">Útiles</a>
            <a mat-button href="#contacto" class="nav-link text-gray-600! hover:text-[#001e40]! px-4!">Contacto</a>
        </div>

        <div class="hidden md:flex items-center gap-3 ml-6">
            <button mat-icon-button
                class="text-[#001e40]! bg-gray-100/50! hover:bg-gray-100! flex items-center justify-center"
                matTooltip="Ingresar al Portal" routerLink="/auth/login">
                <mat-icon>person</mat-icon>
            </button>
            <a mat-flat-button href="#admision"
                class="bg-[#2dbcfe]! text-[#001e40]! rounded-full! font-bold! px-6! shadow-sm hover:shadow-md transition-all">
                Admisión 2025
            </a>
        </div>

        <button mat-icon-button class="md:hidden! ml-auto text-[#001e40]!" (click)="menuClick.emit()">
            <mat-icon>menu</mat-icon>
        </button>
    </div>
</mat-toolbar>
